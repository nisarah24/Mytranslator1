name: Build APK Debug

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Show files
        run: ls -R

      - name: Permission
        run: chmod +x gradlew

      - name: Gradle Version Check
        run: ./gradlew --version

      - name: Build APK (FULL LOG)
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Check output
        run: ls -R app/build || echo "No build folder"
        
