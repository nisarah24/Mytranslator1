name: Android APK Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Find and make gradlew executable
      run: |
        # Find the gradlew file recursively
        GRADLEW_PATH=$(find . -name "gradlew" -type f | head -1)
        
        # Check if gradlew was found
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Error: gradlew file not found!"
          exit 1
        fi
        
        echo "Found gradlew at: $GRADLEW_PATH"
        
        # Grant execute permissions
        chmod +x "$GRADLEW_PATH"
        
        # Export the path for use in next step
        echo "GRADLEW_PATH=$GRADLEW_PATH" >> $GITHUB_ENV

    - name: Build APK with Gradle
      run: ${{ env.GRADLEW_PATH }} assembleDebug

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: debug-apk
        path: '**/build/outputs/apk/debug/*.apk'
        retention-days: 30
