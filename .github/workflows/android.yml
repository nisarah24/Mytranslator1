name: Project Quality and Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # This avoids the Node.js warning by forcing the newer version
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  analyze-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # Removed problematic cache line, using manual gradle setup if needed
        
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Run Lint Analysis
      run: ./gradlew lintDebug

    - name: Assemble Debug APK
      run: ./gradlew assembleDebug

    - name: Verify Build Artifacts
      run: |
        if [ ! -d "app/src/main/java" ]; then
          echo "Error: Java source directory is missing!"
          exit 1
        fi
        echo "Project structure looks good."
        
