name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Check files
        run: ls -R

      - name: Give permission
        run: chmod +x gradlew

      - name: Clean project
        run: ./gradlew clean

      - name: Build APK (IMPORTANT)
        run: ./gradlew assembleDebug --stacktrace

      - name: Show build folder
        run: ls -R app/build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-file
          path: app/build/outputs/apk/debug/
