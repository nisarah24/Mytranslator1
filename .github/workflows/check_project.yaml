name: Android Build and Release

on:
  push:
    branches: [ main ] # Runs on every push to main
  workflow_dispatch: # Allows you to run it manually

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # Build the APK (This takes 2-5 minutes)
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # Upload APK as an Artifact (Direct Download from Actions)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: my-translator-app
        path: app/build/outputs/apk/debug/*.apk

    # Optional: Create a Release if you want
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: latest-build
        name: Latest Development Build
        body: "Automated build of the latest code."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
